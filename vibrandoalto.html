<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibrando Alto · Erika Sedeño</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    #camera-feed {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    #frase {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      text-align: center;
      color: #000;
      font-size: clamp(1rem, 8vw, 5rem);
      font-weight: 900;
      font-family: 'Arial Black', 'Arial Bold', sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1.4s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    #frase.visible { opacity: 1; }
    #btn-camara {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.5);
      color: #fff;
      padding: 1rem 2rem;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(4px);
      border-radius: 2px;
    }
    #firma {
      position: fixed;
      top: 6%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      color: rgba(255,255,255,0.35);
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-family: Georgia, serif;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <video id="camera-feed" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="firma">Erika Sedeño</div>
  <div id="frase">Vibrando Alto</div>
  <button id="btn-camara">Activar cámara</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const frase = document.getElementById('frase');
    const btnCamara = document.getElementById('btn-camara');
    const videoEl = document.getElementById('camera-feed');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Paleta turquesa de la obra
    const TEALS = [
      'rgba(0, 180, 170, ',
      'rgba(0, 160, 150, ',
      'rgba(20, 200, 185, ',
      'rgba(0, 195, 180, ',
      'rgba(40, 210, 195, ',
    ];

    class PulseRing {
      constructor(delay) {
        this.delay = delay;
        this.reset();
      }

      reset() {
        this.radius = 0;
        this.maxRadius = Math.max(canvas.width, canvas.height) * 0.75;
        this.speed = 2.5 + Math.random() * 1.5;
        this.dotCount = 60 + Math.floor(Math.random() * 40);
        this.dotRadius = 4 + Math.random() * 4;
        this.color = TEALS[Math.floor(Math.random() * TEALS.length)];
        this.life = 1.0;
        this.active = this.delay <= 0;
      }

      update() {
        if (this.delay > 0) {
          this.delay--;
          return;
        }
        this.active = true;
        this.radius += this.speed;
        this.life = 1 - (this.radius / this.maxRadius);

        if (this.radius >= this.maxRadius) {
          this.delay = 0;
          this.reset();
        }
      }

      draw() {
        if (!this.active || this.life <= 0) return;
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const alpha = Math.pow(this.life, 1.5) * 0.9;

        for (let i = 0; i < this.dotCount; i++) {
          const angle = (i / this.dotCount) * Math.PI * 2;
          // Slight wobble on each dot for organic feel
          const wobble = Math.sin(angle * 6 + this.radius * 0.05) * 4;
          const r = this.radius + wobble;
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;

          ctx.beginPath();
          ctx.arc(x, y, this.dotRadius * this.life, 0, Math.PI * 2);
          ctx.fillStyle = this.color + alpha + ')';
          ctx.fill();
        }
      }
    }

    let rings = [];
    let animating = false;

    function initRings() {
      rings = [];
      const count = 5;
      for (let i = 0; i < count; i++) {
        rings.push(new PulseRing(i * 40));
      }
    }

    function animate() {
      if (!animating) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const r of rings) {
        r.update();
        r.draw();
      }
      requestAnimationFrame(animate);
    }

    btnCamara.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        videoEl.srcObject = stream;
        btnCamara.style.display = 'none';
        initRings();
        animating = true;
        animate();
        setTimeout(() => frase.classList.add('visible'), 1500);
      } catch (err) {
        btnCamara.textContent = 'Continuar sin cámara';
        btnCamara.addEventListener('click', () => {
          btnCamara.style.display = 'none';
          initRings();
          animating = true;
          animate();
          setTimeout(() => frase.classList.add('visible'), 1500);
        }, { once: true });
      }
    });
  </script>
</body>
</html>
