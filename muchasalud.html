<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mucha Salud · Erika Sedeño</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    #camera-feed {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    #frase {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      text-align: center;
      color: #000;
      font-size: clamp(1rem, 8vw, 5rem);
      font-weight: 900;
      font-family: 'Arial Black', 'Arial Bold', sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1.4s ease;
      pointer-events: none;
      width: 90vw;
      line-height: 1.15;
      white-space: nowrap;
    }
    #frase.visible { opacity: 1; }
    #btn-camara {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.5);
      color: #fff;
      padding: 1rem 2rem;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(4px);
      border-radius: 2px;
    }
    #firma {
      position: fixed;
      top: 6%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      color: rgba(255,255,255,0.35);
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-family: Georgia, serif;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <video id="camera-feed" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="firma">Erika Sedeño</div>
  <div id="frase">Mucha Salud</div>
  <button id="btn-camara">Activar cámara</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const frase = document.getElementById('frase');
    const btnCamara = document.getElementById('btn-camara');
    const videoEl = document.getElementById('camera-feed');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const BLUES = [
      'rgba(74, 119, 194, ',
      'rgba(90, 140, 210, ',
      'rgba(30, 70, 160, ',
      'rgba(110, 155, 220, ',
      'rgba(50, 95, 175, ',
      'rgba(20, 55, 140, ',
    ];

    // Número de filas de flujo
    const ROWS = 14;

    class FlowDot {
      constructor(rowIndex) {
        this.row = rowIndex;
        this.reset(true);
      }

      reset(init = false) {
        const rowSpacing = canvas.height / (ROWS + 1);
        // Cada fila tiene una onda sinusoidal distinta
        this.baseY = rowSpacing * (this.row + 1);
        this.waveAmp = 18 + Math.random() * 22;
        this.waveFreq = 0.008 + Math.random() * 0.006;
        this.waveOffset = Math.random() * Math.PI * 2;
        this.speed = 1.2 + Math.random() * 2.5;

        // Empieza desde la izquierda (fuera de pantalla)
        if (init) {
          this.x = Math.random() * canvas.width;
        } else {
          this.x = -20;
        }

        this.radius = 4 + Math.random() * 7;
        this.color = BLUES[Math.floor(Math.random() * BLUES.length)];
        this.alpha = 0.5 + Math.random() * 0.45;
        this.t = Math.random() * 1000;
      }

      update() {
        this.x += this.speed;
        this.t += 0.04;
        this.y = this.baseY + Math.sin(this.t * this.waveFreq * 80 + this.waveOffset) * this.waveAmp;

        if (this.x > canvas.width + 20) {
          this.reset();
        }
      }

      draw() {
        // Fade in at left, fade out at right
        let alpha = this.alpha;
        const fadeZone = 80;
        if (this.x < fadeZone) alpha *= this.x / fadeZone;
        if (this.x > canvas.width - fadeZone) alpha *= (canvas.width - this.x) / fadeZone;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color + alpha + ')';
        ctx.fill();
      }
    }

    let dots = [];
    let animating = false;

    function initDots() {
      dots = [];
      // Varias bolitas por fila para densidad
      for (let row = 0; row < ROWS; row++) {
        const count = 8 + Math.floor(Math.random() * 6);
        for (let i = 0; i < count; i++) {
          dots.push(new FlowDot(row));
        }
      }
    }

    function animate() {
      if (!animating) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const d of dots) {
        d.update();
        d.draw();
      }
      requestAnimationFrame(animate);
    }

    btnCamara.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        videoEl.srcObject = stream;
        btnCamara.style.display = 'none';
        initDots();
        animating = true;
        animate();
        setTimeout(() => frase.classList.add('visible'), 1500);
      } catch (err) {
        btnCamara.textContent = 'Continuar sin cámara';
        btnCamara.addEventListener('click', () => {
          btnCamara.style.display = 'none';
          initDots();
          animating = true;
          animate();
          setTimeout(() => frase.classList.add('visible'), 1500);
        }, { once: true });
      }
    });
  </script>
</body>
</html>
